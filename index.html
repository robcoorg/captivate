<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>NanoStudio — AI Website Builder for Agencies &amp; Freelancers</title>
    <meta name="description" content="Turn a client brief into a complete, professional website in under 5 minutes. NanoStudio uses AI to generate copy, layout, and structure — you review, approve, and ship." />
    <link rel="canonical" href="https://captivate.icu/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://captivate.icu/" />
    <meta property="og:site_name" content="NanoStudio" />
    <meta property="og:title" content="NanoStudio — AI Website Builder for Agencies &amp; Freelancers" />
    <meta property="og:description" content="Turn a client brief into a complete, professional website in under 5 minutes. AI-generated copy, layout, and structure — you approve and ship." />
    <meta property="og:image" content="https://captivate.icu/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nanostudio_ai" />
    <meta name="twitter:title" content="NanoStudio — AI Website Builder for Agencies &amp; Freelancers" />
    <meta name="twitter:description" content="Turn a client brief into a complete, professional website in under 5 minutes." />
    <meta name="twitter:image" content="https://captivate.icu/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NanoStudio",
      "url": "https://captivate.icu",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI-powered website builder for agencies and freelancers. Generate professional client websites from a brief in under 5 minutes.",
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Starter", "price": "12", "priceCurrency": "USD", "billingDuration": "P1M" },
        { "@type": "Offer", "name": "Pro", "price": "40", "priceCurrency": "USD", "billingDuration": "P1M" },
        { "@type": "Offer", "name": "Studio", "price": "90", "priceCurrency": "USD", "billingDuration": "P1M" }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
